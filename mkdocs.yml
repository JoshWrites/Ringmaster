site_name: Ringmaster
site_description: GPU workstation AI task orchestrator for home networks
site_url: https://joshwrites.github.io/Ringmaster/
repo_url: https://github.com/JoshWrites/Ringmaster
repo_name: JoshWrites/Ringmaster

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  - User Guide:
    - Installation: guide/installation.md
    - Configuration: guide/configuration.md
    - Tasks: guide/tasks.md
    - Sessions: guide/sessions.md
  - Architecture: architecture/overview.md
  - Reference:
    - REST API: reference/api.md
    - CLI: reference/cli.md
    - Configuration: reference/config.md
